<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mesh Traceroute</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylineDecorator.js"></script>
<link rel="stylesheet" href="/static/css/plugin.css">
<style>
    
    body { font-family: var(--mono); background: var(--bg); color: var(--txt); margin: 0; padding: 16px; }
    .card { background: var(--bg2); border: 1px solid var(--bd2); border-radius: var(--r); }
    .ch { padding: 12px; border-bottom: 1px solid var(--bd); display: flex; align-items: center; }
    .ct { font-size: 12px; font-weight: bold; color: var(--acc); letter-spacing: 1px; }
    .inp { background: var(--bg); color: var(--txt); border: 1px solid var(--bd); padding: 8px; border-radius: var(--r); outline: none; }
    .inp:focus { border-color: var(--acc); }
    .btn { background: var(--bg); color: var(--txt); border: 1px solid var(--bd); padding: 8px 16px; border-radius: var(--r); cursor: pointer; font-weight: bold; transition: all 0.2s; }
    .btn:hover { border-color: var(--acc); color: var(--acc); }
    .btn-acc { background: var(--acc); color: var(--bg); border-color: var(--acc); }
    .btn-acc:hover { background: var(--acc); color: var(--bg); border-color: var(--acc); }
    .btn-sm { padding: 4px 10px; font-size: 10px; }
    .tr-tab-btn.active { background: var(--acc); color: var(--bg); border-color: var(--acc); }
    .arow { display: flex; gap: 8px; }
    .ni { cursor: pointer; transition: background 0.2s; display: flex; align-items: center; }
    .ni:hover { background: rgba(0, 200, 240, 0.1); }
    .pill { padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: bold; }
    .p-ok { background: rgba(0, 232, 122, 0.1); color: var(--ok); border: 1px solid var(--ok); }
    .p-warn { background: rgba(255, 168, 38, 0.1); color: var(--warn); border: 1px solid var(--warn); }
    .g4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .stat-big { background: rgba(0,0,0,0.3); border: 1px solid var(--bd); padding: 16px; border-radius: 8px; text-align: center; }
    .stat-big .n { font-family: var(--mono); font-weight: bold; margin-bottom: 8px; }
    .stat-big .l { font-size: 10px; color: var(--txt3); font-weight: bold; letter-spacing: 1px; }
    .hl-acc { border-bottom: 2px solid var(--acc); }


/* ── Mobile responsive ── */
@media (max-width: 860px) {
    /* Stack sidebar layouts using inline styles (most plugins) */
    [style*="grid-template-columns: 340px"],
    [style*="grid-template-columns: 300px"],
    [style*="grid-template-columns: 280px"],
    [style*="grid-template-columns: 260px"],
    [style*="grid-template-columns: 380px"],
    [style*="grid-template-columns: 1fr 380px"],
    [style*="grid-template-columns: 1fr 340px"] {
        grid-template-columns: 1fr !important;
    }
    /* Stack CSS sidebar layouts */
    .cfg-grid, .live-grid, .prompts-grid, .guide-grid, .dl-grid,
    .vault-layout, .manage-layout, .comp-grid, .sidebar,
    .sp-wrap {
        grid-template-columns: 1fr !important;
    }
    /* Wrap nav/filter rows */
    .hdr-nav, .main-tabs, .fi-row, .chk-row, .btn-row, .toggle-row, .srow {
        flex-wrap: wrap;
        gap: 4px;
    }
    .nav-tab, .tab-btn, .tp-btn {
        padding: 6px 10px;
        font-size: 10px;
    }
    /* Full-width forms */
    .form-row, .frow, .input-group {
        flex-direction: column;
        align-items: stretch;
    }
    .form-row > *, .frow > * { width: 100%; }
    /* Tables scroll horizontal */
    .table-wrap, .data-table {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }
    /* Smaller cards */
    .card { border-radius: 4px; }
    .card-head { padding: 8px 12px; }
    .card-body { padding: 10px; }
    /* Stack header */
    .hdr, .topbar { flex-wrap: wrap; height: auto; padding: 8px 12px; gap: 8px; }
    .hdr-stats { gap: 12px; }
    .stat-val { font-size: 16px; }
    /* Modal touch-friendly */
    .modal-box { width: 95vw; max-width: 95vw; max-height: 90vh; }
    /* URL service grid: 2 col → 1 col */
    .url-service-grid { grid-template-columns: 1fr !important; }
    /* Generic multi-col grids → 2-col */
    [class*="grid-3"], [class*="grid-4"], [class*="grid-5"],
    .nb-grid, .wt-grid, .stat-grid, .fgrid2, .fg {
        grid-template-columns: repeat(2, 1fr) !important;
    }
}
@media (max-width: 480px) {
    .hdr, .topbar { padding: 6px 8px; gap: 6px; }
    .logo-name { font-size: 13px; }
    .card-body { padding: 8px; }
    .btn, .tp-btn { padding: 8px 14px; font-size: 11px; }
    .nav-tab, .tab-btn { padding: 4px 8px; font-size: 9px; }
    .stat-val { font-size: 14px; }
    .stat-lbl { font-size: 8px; }
    /* Full-width buttons */
    .btn-primary, .btn-danger, .btn-ghost { width: 100%; justify-content: center; }
    /* Multi-col grids → single */
    [class*="grid-3"], [class*="grid-4"], [class*="grid-5"],
    .nb-grid, .wt-grid, .stat-grid, .fgrid2, .fg {
        grid-template-columns: 1fr !important;
    }
    /* Row tables stack */
    .srow { grid-template-columns: 1fr !important; }
    .srow-key, .srow-val { display: block; }
    .srow-key, .srow-val { display: block; }
}

</style>
</head>
<body>

<div class="vs" style="height: 100%; display: flex; flex-direction: column; overflow: hidden;">
    <div style="display: grid; grid-template-columns: 280px 1fr; gap: 16px; flex: 1; overflow: hidden;">

        <div class="card" style="display: flex; flex-direction: column; overflow: hidden;">
            <div class="ch">
                <span class="ct">🛰 TRACEROUTE</span>
            </div>

            <div style="padding: 10px; border-bottom: 1px solid var(--bd); display: flex; flex-direction: column; gap: 6px;">
                <div class="arow">
                    <input type="text" id="tr-node-input" class="inp mono"
                        placeholder="!xxxxxxxx" maxlength="9"
                        style="font-size: 11px; flex: 1;">
                    <input type="number" id="tr-hop-limit" class="inp mono"
                        value="5" min="1" max="7"
                        style="width: 52px; font-size: 11px; text-align: center;" title="Hop Limit">
                </div>
                <button id="tr-run-btn" class="btn btn-acc" style="width: 100%;"
                    onclick="window.C2TracerouteApp.run()">
                    <i class="fas fa-route"></i> TRACE ROUTE
                </button>
                <div id="tr-status"
                    style="font-size: 10px; font-family: var(--mono); color: var(--txt3); min-height: 14px; text-align: center;">
                </div>
            </div>

            <div style="padding: 6px 10px; border-bottom: 1px solid var(--bd);">
                <input type="text" id="tr-node-filter" class="inp mono"
                    placeholder="Search nodes..." style="font-size: 10px;"
                    oninput="window.C2TracerouteApp.renderNodeList()">
            </div>
            <div style="padding: 5px 12px; font-size: 9px; font-weight: 800;
                letter-spacing: 1px; color: var(--txt3); font-family: var(--mono);
                border-bottom: 1px solid var(--bd);">
                KNOWN NODES — CLICK TO SELECT
            </div>
            <div id="tr-node-list" style="flex: 1; overflow-y: auto; background: var(--bg);">
                <div style="padding: 20px; text-align: center; color: var(--txt3);
                    font-family: var(--mono); font-size: 10px;">SCANNING MESH...</div>
            </div>

            <div style="padding: 5px 12px; font-size: 9px; font-weight: 800;
                letter-spacing: 1px; color: var(--txt3); font-family: var(--mono);
                border-top: 1px solid var(--bd); border-bottom: 1px solid var(--bd);">
                TRACE HISTORY
            </div>
            <div id="tr-history-list" style="max-height: 170px; overflow-y: auto; background: var(--bg);">
                <div style="padding: 12px; text-align: center; color: var(--txt3);
                    font-family: var(--mono); font-size: 10px;">LOADING...</div>
            </div>
        </div>

        <div class="card" style="display: flex; flex-direction: column; overflow: hidden;">

            <div class="ch" style="flex-wrap: nowrap; gap: 8px;">
                <span class="ct" id="tr-result-title">NO TRACE ACTIVE</span>
                <span id="tr-result-meta"
                    style="font-size: 10px; font-family: var(--mono); color: var(--txt3); margin-left: 6px;"></span>
                <div style="margin-left: auto; display: flex; gap: 6px;">
                    <button class="btn btn-sm tr-tab-btn active" id="tr-tab-result-btn"
                        onclick="window.C2TracerouteApp.switchTab('result')">
                        <i class="fas fa-list"></i> RESULT
                    </button>
                    <button class="btn btn-sm tr-tab-btn" id="tr-tab-map-btn"
                        onclick="window.C2TracerouteApp.switchTab('map')">
                        <i class="fas fa-map"></i> MAP
                    </button>
                </div>
            </div>

            <div id="tr-tab-result" style="flex: 1; overflow-y: auto; padding: 16px; background: var(--bg);">
                <div style="color: var(--txt3); font-family: var(--mono);
                    text-align: center; margin-top: 80px; font-size: 11px;">
                    [ SELECT A NODE AND PRESS TRACE ROUTE ]
                </div>
            </div>

            <div id="tr-tab-map" style="flex: 1; display: none; flex-direction: column; position: relative;">
                <div id="tr-map" style="flex: 1; width: 100%; min-height: 0;"></div>
                <div id="tr-map-alert" style="display: none; background: rgba(255,168,38,0.1);
                    border-top: 1px solid rgba(255,168,38,0.3); padding: 8px 14px;
                    font-family: var(--mono); font-size: 10px; color: var(--warn);">
                </div>
            </div>
        </div>

    </div>
</div>

<script>
if (!window.escapeHtml) {
    window.escapeHtml = function(str) {
        if(!str) return '';
        return String(str).replace(/[&<>'"]/g, match => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
        }[match]));
    };
}

window.C2TracerouteApp = {
    _map:         null,
    _mapLayers:   [],
    _currentData: null,
    _activeTab:   'result',
    _nodeCache:   {},
    _abortCtrl:   null,
    _cooldownEnd: 0,
    _tickInterval: null,
    sendSlotId:   'node_0',

    init() {
        this.sendSlotId = window._activeSlotId || 'node_0';
        if (this._abortCtrl) { try { this._abortCtrl.abort(); } catch(e) {} this._abortCtrl = null; }
        this._currentData = null;
        const resultEl = document.getElementById('tr-result');
        if (resultEl) resultEl.innerHTML = '';
        this.setStatus?.('', '');
        this.renderNodeList();
        this.loadHistory();
        document.getElementById('tr-slot-picker-wrap')?.remove();
        const input = document.getElementById('tr-node-input');
        if (input) { input.value = ''; input.addEventListener('keydown', e => { if (e.key === 'Enter') this.run(); }); }
    },

    _startCooldown(ms) {
        this._cooldownEnd = Date.now() + ms;
        this._tickCooldown();
        if (this._tickInterval) clearInterval(this._tickInterval);
        this._tickInterval = setInterval(() => this._tickCooldown(), 500);
    },

    _tickCooldown() {
        const btn = document.getElementById('tr-run-btn');
        if (!btn) return;
        const remaining = Math.ceil((this._cooldownEnd - Date.now()) / 1000);
        if (remaining <= 0) {
            clearInterval(this._tickInterval);
            this._tickInterval = null;
            this._cooldownEnd  = 0;
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-route"></i> TRACE ROUTE';
            btn.style.opacity = '';
        } else {
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-clock"></i> WAIT ${remaining}s`;
            btn.style.opacity = '0.65';
        }
    },

    _clearCooldown() {
        if (this._tickInterval) clearInterval(this._tickInterval);
        this._tickInterval = null;
        this._cooldownEnd  = 0;
        const btn = document.getElementById('tr-run-btn');
        if (btn) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-route"></i> TRACE ROUTE';
            btn.style.opacity = '';
        }
    },

    _isCoolingDown() {
        return Date.now() < this._cooldownEnd;
    },

    setStatus(msg, cls) {
        const el = document.getElementById('tr-status');
        if (!el) return;
        el.textContent = msg;
        el.style.color = cls === 'ok'  ? 'var(--ok)'
                       : cls === 'err' ? 'var(--err)'
                       : cls === 'run' ? 'var(--warn)'
                       : 'var(--txt3)';
    },

    switchTab(tab) {
        this._activeTab = tab;
        document.getElementById('tr-tab-result').style.display = tab === 'result' ? 'block' : 'none';
        document.getElementById('tr-tab-map').style.display    = tab === 'map'    ? 'flex'  : 'none';
        document.getElementById('tr-tab-result-btn').classList.toggle('active', tab === 'result');
        document.getElementById('tr-tab-map-btn').classList.toggle('active',    tab === 'map');
        if (tab === 'map') {
            this._initMap();
            if (this._currentData) setTimeout(() => this._renderMap(this._currentData), 50);
        }
    },

    renderNodeList() {
        const list   = document.getElementById('tr-node-list');
        const filter = (document.getElementById('tr-node-filter')?.value || '').toLowerCase();
        if (!list) return;
        
        let nodeData = {};
        if (window.parent?.meshState?.nodes) nodeData = window.parent.meshState.nodes;
        else if (window.meshState?.nodes) nodeData = window.meshState.nodes;

        const nodes = Object.values(nodeData)
            .filter(n => !n.isLocal)
            .filter(n => {
                if (!filter) return true;
                const name = (n.long_name || n.longName || n.short_name || n.shortName || n.user?.longName || n.user?.shortName || '').toLowerCase();
                return name.includes(filter) || (n.node_id || '').toLowerCase().includes(filter);
            });
            
        nodes.sort((a, b) => (b.lastHeard || 0) - (a.lastHeard || 0));
        
        if (!nodes.length) {
            list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--txt3);font-family:var(--mono);font-size:10px;">NO NODES FOUND</div>`;
            return;
        }
        
        list.innerHTML = nodes.map(n => {
            const name   = n.long_name || n.longName || n.short_name || n.shortName || n.user?.longName || n.user?.shortName || n.node_id;
            const online = n.lastHeard && (Date.now()/1000 - n.lastHeard) < 3600;
            const hasPos = n.latitude != null && n.longitude != null || n.position?.latitude != null;
            
            let ago = '';
            if (n.lastHeard) {
                const diff = Date.now()/1000 - n.lastHeard;
                if (diff < 60) ago = '< 1m';
                else if (diff < 3600) ago = Math.floor(diff/60) + 'm';
                else ago = Math.floor(diff/3600) + 'h';
            }
            
            return `
                <div class="ni" onclick="window.C2TracerouteApp.selectNode('${n.node_id}')"
                    style="border-left:none;border-bottom:1px solid var(--bd);padding:9px 12px;">
                    <div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-right:10px;
                        background:${online ? 'var(--ok)' : 'var(--bd2)'};
                        ${online ? 'box-shadow:0 0 5px var(--ok)' : ''}"></div>
                    <div style="flex:1;overflow:hidden;">
                        <div style="font-size:11px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                            ${window.escapeHtml(name)}
                        </div>
                        <div style="font-size:9px;color:var(--txt3);font-family:var(--mono);">
                            ${n.node_id}
                            ${hasPos ? '<i class="fas fa-location-dot" style="color:var(--ok);margin-left:4px;" title="Has GPS"></i>' : ''}
                            ${ago ? '· ' + ago : ''}
                        </div>
                    </div>
                </div>`;
        }).join('');
    },

    selectNode(nodeId) {
        const input = document.getElementById('tr-node-input');
        if (input) input.value = nodeId;
        if (this._isCoolingDown()) {
            const remaining = Math.ceil((this._cooldownEnd - Date.now()) / 1000);
            this.setStatus(`Target: ${nodeId} — cooldown ${remaining}s`, 'run');
        } else {
            this._currentData = null;
            document.getElementById('tr-result-title').textContent = 'NO TRACE ACTIVE';
            document.getElementById('tr-result-meta').textContent  = '';
            document.getElementById('tr-tab-result').innerHTML = `
                <div style="color:var(--txt3);font-family:var(--mono);text-align:center;margin-top:80px;font-size:11px;">
                    [ SELECT A NODE AND PRESS TRACE ROUTE ]
                </div>`;
            this.setStatus(`Target: ${nodeId}`, '');
        }
    },

    async _getNodeCoords(nodeId) {
        if (this._nodeCache[nodeId]) return this._nodeCache[nodeId];
        
        let nodeData = window.parent?.meshState?.nodes || window.meshState?.nodes || {};
        const n = nodeData[nodeId];
        
        const lat = n?.latitude  ?? n?.position?.latitude;
        const lon = n?.longitude ?? n?.position?.longitude;
        const name = n?.long_name || n?.longName || n?.short_name || n?.shortName || n?.user?.longName || nodeId;
        
        if (lat != null && lon != null) {
            this._nodeCache[nodeId] = { lat, lon, name, hasCoords: true };
            return this._nodeCache[nodeId];
        }
        
        try {
            const res = await fetch(`/api/nodes/${encodeURIComponent(nodeId)}`);
            if (res.ok) {
                const d = await res.json();
                const aLat = d.latitude  ?? d.position?.latitude  ?? (d.position?.latitudeI  ? d.position.latitudeI  / 1e7 : null);
                const aLon = d.longitude ?? d.position?.longitude ?? (d.position?.longitudeI ? d.position.longitudeI / 1e7 : null);
                const aName = d.long_name || d.short_name || d.user?.longName || d.user?.shortName || nodeId;
                if (aLat != null && aLon != null) {
                    this._nodeCache[nodeId] = { lat: aLat, lon: aLon, name: aName, hasCoords: true };
                    return this._nodeCache[nodeId];
                }
                this._nodeCache[nodeId] = { lat: null, lon: null, name: aName, hasCoords: false };
                return this._nodeCache[nodeId];
            }
        } catch (_) {}
        this._nodeCache[nodeId] = { lat: null, lon: null, name: nodeId, hasCoords: false };
        return this._nodeCache[nodeId];
    },

    async run() {
        if (this._isCoolingDown()) return;

        const nodeId   = (document.getElementById('tr-node-input')?.value || '').trim();
        const hopLimit = parseInt(document.getElementById('tr-hop-limit')?.value) || 5;

        if (!nodeId)                { this.setStatus('Enter a node ID first', 'err'); return; }
        if (!nodeId.startsWith('!')){ this.setStatus('Node ID must start with !', 'err'); return; }

        if (window._activeSlotId === 'all') {
            const slots = Object.keys(window._knownSlots || { node_0: true });
            this._startCooldown(60000 * slots.length);
            this.setStatus(`Tracing ${nodeId} from ${slots.length} radios...`, 'run');
            for (const sid of slots) {
                this.setStatus(`Tracing ${nodeId} via ${sid}...`, 'run');
                try {
                    const res = await fetch('/api/traceroute/run', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ node_id: nodeId, hop_limit: hopLimit, slot_id: sid }),
                        credentials: 'include',
                    });
                    if (res.ok) {
                        const data = await res.json();
                        this.handleResult({ ...data, _via_slot: sid });
                    }
                } catch (_) {}
            }
            this.setStatus('All-radio traceroute complete', 'ok');
            return;
        }

        if (this._abortCtrl) this._abortCtrl.abort();
        this._abortCtrl = new AbortController();
        const signal = this._abortCtrl.signal;

        this._startCooldown(60000);
        this.setStatus(`Tracing ${nodeId}...`, 'run');
        this._showPending(nodeId);

        try {
            const res = await fetch('/api/traceroute/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ node_id: nodeId, hop_limit: hopLimit, slot_id: window._activeSlotId || 'node_0' }),
                credentials: 'include',
                signal,
            });

            this._clearCooldown();

            if (res.status === 504) {
                this.setStatus('No response — node offline or out of range', 'err');
                this._showError(nodeId, 'No response within 60s. Node may be offline or out of range.');
                return;
            }
            if (!res.ok) {
                const err = await res.json().catch(() => ({ detail: res.statusText }));
                this.setStatus(`Error ${res.status}: ${err.detail}`, 'err');
                this._showError(nodeId, err.detail || res.statusText);
                return;
            }

            const data = await res.json();
            this.setStatus('Trace complete', 'ok');
            this._currentData = data;
            this.renderResult(data);
            this.loadHistory();
            if (this._activeTab === 'map') this._renderMap(data);

        } catch (e) {
            if (e.name === 'AbortError') return;
            this.setStatus(`Fetch error: ${e.message}`, 'err');
            this._showError(nodeId, e.message);
        }
    },

    _showPending(nodeId) {
        document.getElementById('tr-result-title').textContent = `TRACING ${nodeId.toUpperCase()}`;
        document.getElementById('tr-result-meta').textContent  = '';
        document.getElementById('tr-tab-result').innerHTML = `
            <div style="color:var(--warn);font-family:var(--mono);text-align:center;margin-top:80px;font-size:11px;">
                <i class="fas fa-satellite-dish fa-pulse" style="font-size:28px;margin-bottom:16px;display:block;"></i>
                SENDING TRACEROUTE PACKET...<br>
                <span style="color:var(--txt3);font-size:10px;">Awaiting response from ${nodeId}</span>
            </div>`;
    },

    _showError(nodeId, msg) {
        document.getElementById('tr-result-title').textContent = `TRACE FAILED — ${nodeId.toUpperCase()}`;
        document.getElementById('tr-tab-result').innerHTML = `
            <div style="color:var(--err);font-family:var(--mono);text-align:center;margin-top:80px;font-size:11px;">
                <i class="fas fa-exclamation-triangle" style="font-size:28px;margin-bottom:16px;display:block;"></i>
                ${window.escapeHtml(msg)}
            </div>`;
    },

    renderResult(d) {
        document.getElementById('tr-result-title').textContent = `TRACE — ${(d.target || '').toUpperCase()}`;
        document.getElementById('tr-result-meta').textContent  =
            d.timestamp ? new Date(d.timestamp * 1000).toLocaleTimeString() : '';
        const body = document.getElementById('tr-tab-result');
        if (!body) return;
        
        const snrBadge = v => {
            if (v == null) return `<span style="color:var(--txt3)">—</span>`;
            const c = v >= 5 ? 'var(--ok)' : v >= 0 ? 'var(--warn)' : 'var(--err)';
            return `<span style="color:${c};font-weight:700;">${v}&thinsp;dB</span>`;
        };
        
        const rssiBadge = v => {
            if (v == null) return `<span style="color:var(--txt3)">—</span>`;
            const c = v >= -80 ? 'var(--ok)' : v >= -100 ? 'var(--warn)' : 'var(--err)';
            return `<span style="color:${c};font-weight:700;">${v}&thinsp;dBm</span>`;
        };
        
        const buildPath = (hops, colour, label, icon) => {
            if (!hops?.length) return '';
            return `
            <div style="background:rgba(0,0,0,0.4);border:1px solid ${colour}33;
                border-left:3px solid ${colour};border-radius:6px;padding:14px 16px;margin-bottom:16px;">
                <div style="font-size:10px;font-weight:800;letter-spacing:1.5px;
                    color:${colour};font-family:var(--mono);margin-bottom:14px;
                    display:flex;align-items:center;gap:8px;">
                    <i class="${icon}"></i> ${label}
                </div>
                ${hops.map((h, i) => `
                <div style="display:flex;align-items:stretch;margin-bottom:0;">
                    <div style="display:flex;flex-direction:column;align-items:center;
                        width:28px;flex-shrink:0;margin-right:12px;">
                        <div style="width:10px;height:10px;border-radius:50%;
                            background:${i===0 ? 'var(--ok)' : i===hops.length-1 ? colour : 'var(--acc)'};
                            border:2px solid ${colour};flex-shrink:0;
                            box-shadow:0 0 6px ${colour}88;margin-top:2px;"></div>
                        ${i < hops.length-1
                            ? `<div style="width:2px;flex:1;min-height:22px;
                                background:linear-gradient(${colour}, ${colour}44);
                                margin:2px 0;"></div>`
                            : ''}
                    </div>
                    <div style="flex:1;padding:2px 0 ${i < hops.length-1 ? '14px' : '0'} 0;">
                        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                            <span style="font-family:var(--mono);font-size:12px;
                                color:${i===0 ? 'var(--ok)' : i===hops.length-1 ? colour : '#7ad4ff'};
                                font-weight:700;">${window.escapeHtml(h.from)}</span>
                            <span style="color:var(--txt3);font-size:10px;">→</span>
                            <span style="font-family:var(--mono);font-size:12px;
                                color:${i===hops.length-1 ? colour : '#7ad4ff'};
                                font-weight:700;">${window.escapeHtml(h.to)}</span>
                            ${i < hops.length-1 || hops.length === 1
                                ? `<span style="margin-left:auto;font-family:var(--mono);font-size:10px;">
                                    SNR&nbsp;${snrBadge(h.snr)}</span>`
                                : ''}
                        </div>
                        ${i === 0 ? `<div style="font-size:9px;color:var(--txt3);margin-top:2px;font-family:var(--mono);">ORIGIN</div>` : ''}
                        ${i === hops.length-1 ? `<div style="font-size:9px;color:${colour};margin-top:2px;font-family:var(--mono);">DESTINATION</div>` : ''}
                    </div>
                </div>`).join('')}
            </div>`;
        };
        
        const totalMid  = (d.path_to?.length||0) + (d.path_back?.length||0) - 2;
        const linkBadge = d.direct_link
            ? `<span class="pill p-ok">DIRECT LINK</span>`
            : `<span class="pill p-warn">${Math.max(0,totalMid)} INTERMEDIATE HOP(S)</span>`;
            
        body.innerHTML = `
            <div class="g4" style="margin-bottom:20px;">
                <div class="stat-big hl-acc">
                    <div class="n" style="font-size:20px;">${rssiBadge(d.rssi)}</div>
                    <div class="l">RSSI</div>
                </div>
                <div class="stat-big hl-acc">
                    <div class="n" style="font-size:20px;">${snrBadge(d.snr)}</div>
                    <div class="l">SNR (RX)</div>
                </div>
                <div class="stat-big">
                    <div class="n" style="font-size:28px;color:var(--acc);">${d.hops_used ?? 0}</div>
                    <div class="l">HOPS USED</div>
                </div>
                <div class="stat-big" style="justify-content:center;display:flex;flex-direction:column;align-items:center;gap:6px;">
                    ${linkBadge}
                    <div class="l">LINK TYPE</div>
                </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;">
                ${buildPath(d.path_to,   'var(--acc)', 'PATH → TO TARGET',      'fas fa-arrow-right')}
                ${buildPath(d.path_back, 'var(--pur)', 'PATH ← BACK TO ORIGIN', 'fas fa-arrow-left')}
            </div>
            <div style="text-align:center;margin-bottom:16px;">
                <button class="btn btn-sm" onclick="window.C2TracerouteApp.switchTab('map')" style="font-size:10px;">
                    <i class="fas fa-map"></i> VIEW ON MAP
                </button>
            </div>
            <div style="border-top:1px solid var(--bd2);padding-top:12px;">
                <div style="font-size:9px;font-weight:800;letter-spacing:1px;color:var(--txt3);
                    margin-bottom:8px;font-family:var(--mono);">RAW JSON RESPONSE</div>
                <pre style="font-family:var(--mono);font-size:10px;color:var(--txt3);
                    white-space:pre-wrap;word-break:break-all;margin:0;line-height:1.6;">${window.escapeHtml(JSON.stringify(d, null, 2))}</pre>
            </div>`;
    },

    _initMap() {
        const el = document.getElementById('tr-map');
        if (!el || this._map) return;
        this._map = L.map('tr-map', { center: [54.5, -2], zoom: 6, zoomControl: true });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors', maxZoom: 19,
        }).addTo(this._map);
    },

    _clearMapLayers() {
        if (!this._map) return;
        this._mapLayers.forEach(l => this._map.removeLayer(l));
        this._mapLayers = [];
    },

    _makeIcon(colour, label) {
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
            <ellipse cx="14" cy="34" rx="6" ry="2" fill="rgba(0,0,0,0.25)"/>
            <path d="M14 0 C6.3 0 0 6.3 0 14 C0 24.5 14 36 14 36 C14 36 28 24.5 28 14 C28 6.3 21.7 0 14 0Z"
                fill="${colour}" stroke="#000" stroke-width="1.5"/>
            <circle cx="14" cy="14" r="7" fill="rgba(0,0,0,0.35)"/>
            <text x="14" y="18" text-anchor="middle" font-size="9" font-weight="bold"
                font-family="monospace" fill="#fff">${label}</text>
        </svg>`;
        return L.divIcon({ className: '', html: svg, iconSize: [28,36], iconAnchor: [14,36], popupAnchor: [0,-36] });
    },

    async _renderMap(d) {
        this._initMap();
        if (!this._map) return;
        this._clearMapLayers();
        const alertEl = document.getElementById('tr-map-alert');
        const allIds = new Set();
        const collect = hops => (hops||[]).forEach(h => { if(h.from) allIds.add(h.from); if(h.to) allIds.add(h.to); });
        collect(d.path_to);
        collect(d.path_back);
        const coordMap = {};
        await Promise.all([...allIds].map(async id => { coordMap[id] = await this._getNodeCoords(id); }));
        const missing = [...allIds].filter(id => !coordMap[id]?.hasCoords);
        if (missing.length) {
            alertEl.style.display = 'block';
            alertEl.innerHTML = `<i class="fas fa-exclamation-triangle"></i>
                &nbsp;<b>${missing.length} node(s) have no GPS position</b>:
                &nbsp;${missing.map(id => `<code style="background:rgba(255,168,38,0.15);padding:1px 5px;border-radius:3px;">${id}</code>`).join(' ')}`;
        } else {
            alertEl.style.display = 'none';
        }
        const pathCoords = hops => {
            if (!hops?.length) return [];
            const ids = [hops[0].from, ...hops.map(h => h.to)];
            return ids.map(id => coordMap[id]).filter(c => c?.hasCoords).map(c => [c.lat, c.lon]);
        };
        const toCoords   = pathCoords(d.path_to);
        const backCoords = pathCoords(d.path_back);
        if (toCoords.length >= 2) {
            const line = L.polyline(toCoords, { color: 'var(--acc)', weight: 3, opacity: 0.85 }).addTo(this._map);
            this._mapLayers.push(line);
            const deco = L.polylineDecorator(line, { patterns: [{ offset: '15%', repeat: '30%', symbol:
                L.Symbol.arrowHead({ pixelSize: 10, polygon: false, pathOptions: { color: 'var(--acc)', weight: 2 } }) }]
            }).addTo(this._map);
            this._mapLayers.push(deco);
        }
        if (backCoords.length >= 2) {
            const line = L.polyline(backCoords, { color: 'var(--pur)', weight: 3, opacity: 0.85, dashArray: '8 5' }).addTo(this._map);
            this._mapLayers.push(line);
            const deco = L.polylineDecorator(line, { patterns: [{ offset: '15%', repeat: '30%', symbol:
                L.Symbol.arrowHead({ pixelSize: 10, polygon: false, pathOptions: { color: 'var(--pur)', weight: 2 } }) }]
            }).addTo(this._map);
            this._mapLayers.push(deco);
        }
        const placed = new Set();
        const allHops = [...(d.path_to||[]), ...(d.path_back||[])];
        const orderedIds = [allHops[0]?.from, ...allHops.map(h => h.to)].filter(Boolean);
        orderedIds.forEach(id => {
            if (placed.has(id)) return;
            placed.add(id);
            const c = coordMap[id];
            if (!c?.hasCoords) return;
            const isOrigin = id === d.origin;
            const isTarget = id === d.target;
            const colour   = isOrigin ? 'var(--ok)' : isTarget ? 'var(--acc)' : 'var(--warn)';
            const icon     = this._makeIcon(colour, id.slice(-4).toUpperCase());
            const snrTo    = (d.path_to   || []).find(h => h.to === id || h.from === id)?.snr;
            const snrBack  = (d.path_back || []).find(h => h.to === id || h.from === id)?.snr;
            const marker   = L.marker([c.lat, c.lon], { icon }).addTo(this._map);
            marker.bindPopup(`
                <div style="font-family:monospace;font-size:12px;min-width:180px;">
                    <div style="font-weight:bold;color:var(--acc);margin-bottom:4px;">${c.name}</div>
                    <div style="color:var(--txt3);font-size:10px;margin-bottom:6px;">${id}</div>
                    ${isOrigin ? '<div style="color:var(--ok);font-weight:bold;">ORIGIN</div>' : ''}
                    ${isTarget ? '<div style="color:var(--acc);font-weight:bold;">TARGET</div>' : ''}
                    ${snrTo   != null ? `<div style="color:var(--acc);">SNR → ${snrTo} dB</div>`  : ''}
                    ${snrBack != null ? `<div style="color:var(--pur);">SNR ← ${snrBack} dB</div>` : ''}
                    <div style="color:var(--txt3);font-size:10px;margin-top:4px;">${c.lat.toFixed(5)}, ${c.lon.toFixed(5)}</div>
                </div>`);
            this._mapLayers.push(marker);
        });
        const allCoords = [...toCoords, ...backCoords];
        if (allCoords.length === 1) {
            this._map.setView(allCoords[0], 12);
        } else if (allCoords.length > 1) {
            this._map.fitBounds(L.latLngBounds(allCoords), { padding: [40, 40] });
        }
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = () => {
            const div = L.DomUtil.create('div');
            div.style.cssText = `background:rgba(6,11,18,0.9);border:1px solid var(--bd2);border-radius:6px;padding:10px 14px;font-family:monospace;font-size:11px;color:var(--txt);`;
            div.innerHTML = `
                <div style="margin-bottom:6px;font-weight:bold;letter-spacing:1px;font-size:9px;color:var(--txt3);">LEGEND</div>
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><div style="width:20px;height:3px;background:var(--acc);"></div> Path TO target</div>
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><div style="width:20px;height:3px;background:var(--pur);border-top:3px dashed var(--pur);"></div> Path BACK</div>
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;"><div style="width:10px;height:10px;border-radius:50%;background:var(--ok);"></div> Origin</div>
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;"><div style="width:10px;height:10px;border-radius:50%;background:var(--acc);"></div> Target</div>
                <div style="display:flex;align-items:center;gap:8px;"><div style="width:10px;height:10px;border-radius:50%;background:var(--warn);"></div> Relay</div>`;
            return div;
        };
        legend.addTo(this._map);
        this._mapLayers.push(legend);
        setTimeout(() => this._map.invalidateSize(), 60);
    },

    async loadHistory() {
        const list = document.getElementById('tr-history-list');
        if (!list) return;
        try {
            const sq = window._activeSlotId && window._activeSlotId !== 'node_0'
                ? `?slot_id=${encodeURIComponent(window._activeSlotId)}` : '';
            const res = await fetch(`/api/traceroutes?limit=30${sq}`);
            if (!res.ok) throw new Error();
            const rows = await res.json();
            if (!rows.length) {
                list.innerHTML = `<div style="padding:12px;text-align:center;color:var(--txt3);font-family:var(--mono);font-size:10px;">NO HISTORY YET</div>`;
                return;
            }
            list.innerHTML = rows.map(r => {
                let rp = r.route_path;
                try { if (typeof rp === 'string') rp = JSON.parse(rp); } catch (_) {}
                let linkLabel = 'DIRECT', badgeCls = 'p-ok';
                if (rp && typeof rp === 'object' && !Array.isArray(rp)) {
                    const h = (rp.route_to?.length||0) + (rp.route_back?.length||0);
                    if (h > 0) { linkLabel = `${h} HOP`; badgeCls = 'p-warn'; }
                } else if (Array.isArray(rp) && rp.length) {
                    linkLabel = `${rp.length} HOP`; badgeCls = 'p-warn';
                }
                const ts = r.timestamp ? new Date(r.timestamp * 1000).toLocaleTimeString() : '';
                return `
                    <div class="ni" style="border-left:none;border-bottom:1px solid var(--bd);padding:8px 12px;cursor:pointer;"
                        onclick='window.C2TracerouteApp._loadHistoryRow(${JSON.stringify(JSON.stringify(r))})'>
                        <div style="flex:1;overflow:hidden;">
                            <div style="font-size:10px;font-family:var(--mono);color:var(--acc);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                                ${window.escapeHtml(r.to_id || r.from_id || '?')}
                            </div>
                            <div style="font-size:9px;color:var(--txt3);">${ts}</div>
                        </div>
                        <span class="pill ${badgeCls}" style="font-size:11px;margin-left:8px;">${linkLabel}</span>
                    </div>`;
            }).join('');
        } catch (_) {
            list.innerHTML = `<div style="padding:12px;text-align:center;color:var(--err);font-family:var(--mono);font-size:10px;">FAILED TO LOAD</div>`;
        }
    },

    _loadHistoryRow(jsonStr) {
        let r;
        try { r = JSON.parse(jsonStr); } catch (_) { return; }
        let rp = r.route_path;
        try { if (typeof rp === 'string') rp = JSON.parse(rp); } catch (_) {}
        
        let nodeData = window.parent?.meshState?.nodes || window.meshState?.nodes || {};
        let local = r.from_id || '?';
        for (const [nid, node] of Object.entries(nodeData)) {
            if (node.isLocal) {
                local = nid;
                break;
            }
        }

        let synth = null;
        if (rp && typeof rp === 'object' && !Array.isArray(rp)) {
            const nodesTo   = [local,   ...(rp.route_to   || []), r.to_id];
            const nodesBack = [r.to_id, ...(rp.route_back || []), local];
            const snrTo     = rp.snr_towards || [];
            const snrBk     = rp.snr_back    || [];
            const totalMid  = (rp.route_to?.length||0) + (rp.route_back?.length||0);
            synth = {
                target: r.to_id, origin: local,
                rssi: rp.rssi ?? null, snr: rp.snr ?? null,
                hops_used: rp.hops_used ?? 0, direct_link: totalMid === 0,
                path_to:   nodesTo.slice(0,-1).map((n,i)   => ({ from: n, to: nodesTo[i+1],   snr: snrTo[i] ?? null })),
                path_back: nodesBack.slice(0,-1).map((n,i) => ({ from: n, to: nodesBack[i+1], snr: snrBk[i] ?? null })),
                timestamp: r.timestamp,
            };
        } else if (Array.isArray(rp)) {
            const nodesTo = [local, ...rp, r.to_id];
            synth = {
                target: r.to_id, origin: local,
                rssi: null, snr: null, hops_used: rp.length, direct_link: rp.length === 0,
                path_to:   nodesTo.slice(0,-1).map((n,i) => ({ from: n, to: nodesTo[i+1], snr: null })),
                path_back: [{ from: r.to_id, to: local, snr: null }],
                timestamp: r.timestamp,
            };
        }
        if (!synth) return;
        this._currentData = synth;
        this.renderResult(synth);
        if (this._activeTab === 'map') this._renderMap(synth);
        const input = document.getElementById('tr-node-input');
        if (input && r.to_id) input.value = r.to_id;
    },
};

window.onload = () => {
    window.C2TracerouteApp.init();
};
</script>
</body>
</html>
