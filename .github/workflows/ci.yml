name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install linting tools
        run: pip install ruff
      - name: Lint Python
        run: ruff check .

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Python syntax check
        run: |
          failed=0
          for f in $(find . -name "*.py" -not -path "./venv/*" -not -path "./.venv/*"); do
            if ! python -m py_compile "$f" 2>/dev/null; then
              echo "SYNTAX ERROR: $f"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "Syntax check failed."
            exit 1
          fi